<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudos Buildcode UI</title>
    <script
      id="sap-ui-bootstrap"
      src="https://ui5.sap.com/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-libs="sap.m,sap.uxap"
      data-sap-ui-compatVersion="edge"
      data-sap-ui-async="true"
      data-sap-ui-resourceroots='{"com.estudos.buildcode.java1.ui":"./"}'
      data-sap-ui-xx-componentPreload="off"
      data-sap-ui-frameOptions="trusted"
      data-sap-ui-onInit="module:sap/ui/core/ComponentSupport"
    ></script>
  </head>
  <body class="sapUiBody sapUiSizeCompact" id="content">
    <div
      data-sap-ui-component
      data-name="com.estudos.buildcode.java1.ui"
      data-id="container"
      data-settings='{"id" : "com.estudos.buildcode.java1.ui"}'
    ></div>
  </body>
</html>
